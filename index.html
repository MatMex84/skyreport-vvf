// Palette
const COL_RED   = [192, 39, 45];
const COL_REDD  = [139, 26, 30];
const COL_INK   = [38, 42, 52];
const COL_GRAY  = [110, 118, 132];
const COL_LINE  = [218, 222, 230];
const COL_BG    = [247, 248, 250];
const COL_WHITE = [255, 255, 255];

const PAGE_W = 210, PAGE_H = 297, MX = 14; // margini
const CW = PAGE_W - MX * 2;                 // larghezza contenuto = 182

// Intestazione di pagina: sfondo chiaro, testo rosso, logo a sinistra
function drawPageFrame(pdf, title, subtitle) {
  const headH = 28;

  // Logo a sinistra
  try {
    pdf.addImage(LOGO_DATA_URL, 'PNG', MX, 4, 20, 20, 'logo_sapr', 'NONE');
  } catch(e) {}

  // Titolo centrale ente (rosso, come da intestazione ufficiale)
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(17);
  pdfRgb(pdf, COL_RED);
  pdf.text('NUCLEO SAPR — VIGILI DEL FUOCO', PAGE_W / 2, 13, { align: 'center' });

  // Sottotitolo / sezione
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(11);
  pdfRgb(pdf, COL_GRAY);
  pdf.text(subtitle || title, PAGE_W / 2, 20.5, { align: 'center' });

  // Linea rossa di separazione
  pdfDraw(pdf, COL_RED);
  pdf.setLineWidth(0.7);
  pdf.line(MX, headH, PAGE_W - MX, headH);

  // Footer (riferimento normativo, NESSUN copyright nel PDF)
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.3);
  pdf.line(MX, PAGE_H - 12, PAGE_W - MX, PAGE_H - 12);
  pdf.setFont('helvetica', 'italic');
  pdf.setFontSize(7);
  pdfRgb(pdf, COL_GRAY);
  pdf.text('Documentazione ai sensi del D.Lgs. 152/2006 - Segnalazione alla Cabina di Regia',
    PAGE_W / 2, PAGE_H - 8, { align: 'center' });
}

// Etichetta di sezione: barra rossa + testo, niente box pieno
function sectionLabel(pdf, text, y) {
  pdfFill(pdf, COL_RED);
  pdf.rect(MX, y, 2.4, 5.2, 'F');
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(9);
  pdfRgb(pdf, COL_INK);
  pdf.text(text.toUpperCase(), MX + 4.5, y + 4.1);
  return y + 8;
}

// Riga dati identificativi: card grigia 4 colonne + riga file
function drawInfoCard(pdf, y, missione, filename, idxNum, idxTot) {
  const rowH1 = 16;   // altezza riga missione — uguale a GPS e rilievo
  const rowH2 = 10;   // altezza riga file
  const cardH = rowH1 + rowH2;
  pdfFill(pdf, COL_BG);
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.3);
  pdf.rect(MX, y, CW, cardH, 'FD');

  // Linea divisoria orizzontale tra le due righe
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.22);
  pdf.line(MX, y + rowH1, MX + CW, y + rowH1);

  // ── Riga 1: 5 colonne ──
  const cols = [
    ['EQUIPAGGIO',     missione.equipaggio],
    ['COMUNE / LOC.',  missione.comune],
    ['DATA',           missione.dataStr],
    ['MODELLO DRONE',  missione.droneModel || 'N/D'],
    ['MATRICOLA',      missione.matricola],
  ];
  const colW = CW / 5;
  cols.forEach((c, i) => {
    const cx = MX + i * colW + 3;
    if (i > 0) {
      pdfDraw(pdf, COL_LINE);
      pdf.setLineWidth(0.22);
      pdf.line(MX + i * colW, y + 2, MX + i * colW, y + rowH1 - 1);
    }
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(6.2);
    pdfRgb(pdf, COL_RED);
    pdf.text(c[0], cx, y + 5.5);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(8.5);
    pdfRgb(pdf, COL_INK);
    const val = pdf.splitTextToSize(String(c[1] || '—'), colW - 6);
    pdf.text(val[0], cx, y + 12);
    if (val[1]) { pdf.setFontSize(7); pdf.text(val[1], cx, y + 15.5); }
  });

  // ── Riga 2: nome file esteso + contatore ──
  const ry = y + rowH1;
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(6.2);
  pdfRgb(pdf, COL_RED);
  pdf.text('FILE', MX + 3, ry + 6.5);
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(7.5);
  pdfRgb(pdf, COL_INK);
  const fileAvailW = CW - 14 - 22;
  const fileLines = pdf.splitTextToSize(filename || '—', fileAvailW);
  pdf.text(fileLines[0], MX + 14, ry + 6.5);
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(7.5);
  pdfRgb(pdf, COL_GRAY);
  pdf.text(`Foto ${idxNum} / ${idxTot}`, MX + CW - 3, ry + 6.5, { align: 'right' });

  return y + cardH + 4;
}

// Chip arrotondato per le voci selezionate
function drawChip(pdf, text, x, y, accent) {
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(8.5);
  const tw = pdf.getTextWidth(text);
  const padX = 4, h = 6.6;
  const w = tw + padX * 2 + 3.5;
  // sfondo uguale per tutti i chip (nessuna distinzione Altro)
  pdfFill(pdf, COL_BG);
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.3);
  pdf.rect(x, y, w, h, 'FD');
  // pallino rosso
  pdfFill(pdf, COL_RED);
  pdf.circle(x + 3, y + h / 2, 0.9, 'F');
  // testo
  pdfRgb(pdf, COL_INK);
  pdf.text(text, x + 6, y + 4.5);
  return w;
}

async function drawPhotoPage(pdf, p, missione, sensori, idxNum, idxTot) {
  drawPageFrame(pdf, 'DOCUMENTAZIONE FOTOGRAFICA', 'Rapporto Tecnico di Rilevamento Ambientale e Illeciti');

  let y = 33;

  // ── Card dati identificativi ──
  y = sectionLabel(pdf, 'Dati Identificativi', y);
  y = drawInfoCard(pdf, y, missione, p.file.name, idxNum, idxTot);

  // ── Foto: cornice sottile chiara, nessun bordo nero ──
  const imgY = y;
  const imgH = 120;

  let objUrl = null, ok = false;
  try {
    objUrl = URL.createObjectURL(p.file);
    const imgEl = await loadImage(objUrl);
    const sw = imgEl.naturalWidth || imgEl.width;
    const sh = imgEl.naturalHeight || imgEl.height;
    const tR = CW / imgH, sR = sw / sh;
    let cw = sw, ch = sh, cx = 0, cy = 0;
    if (sR > tR) { ch = sh; cw = Math.round(sh * tR); cx = Math.round((sw - cw) / 2); }
    else          { cw = sw; ch = Math.round(sw / tR); cy = Math.round((sh - ch) / 2); }
    const MAXPX = 1700;
    const sc = Math.min(1, MAXPX / Math.max(cw, ch));
    const cv = document.createElement('canvas');
    cv.width = Math.round(cw * sc); cv.height = Math.round(ch * sc);
    cv.getContext('2d').drawImage(imgEl, cx, cy, cw, ch, 0, 0, cv.width, cv.height);
    const alias = 'ph_' + p.file.name.replace(/\W/g, '_') + '_' + p.file.size;
    // Immagine a tutta larghezza, senza riquadro di sfondo
    pdf.addImage(cv.toDataURL('image/jpeg', 0.85), 'JPEG', MX, imgY, CW, imgH, alias, 'NONE');
    ok = true;
  } catch (e) {
    console.warn('PDF image error:', p.file.name, e.message);
  } finally {
    if (objUrl) URL.revokeObjectURL(objUrl);
  }
  if (!ok) {
    pdfFill(pdf, COL_BG);
    pdfDraw(pdf, COL_LINE);
    pdf.setLineWidth(0.3);
    pdf.rect(MX, imgY, CW, imgH, 'FD');
    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(10);
    pdfRgb(pdf, COL_GRAY);
    pdf.text('Immagine non disponibile', PAGE_W / 2, imgY + imgH / 2, { align: 'center' });
  } else {
    // Bordo sottile grigio chiaro attorno alla foto (niente nero)
    pdfDraw(pdf, COL_LINE);
    pdf.setLineWidth(0.4);
    pdf.rect(MX, imgY, CW, imgH, 'D');
  }

  y = imgY + imgH + 3;

  // ── GPS: riga testo compatta sotto la foto, senza box ──
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(7);
  pdfRgb(pdf, COL_GRAY);
  const gpsItems = [
    `LAT ${p.lat}`,
    `LON ${p.lon}`,
    `ASL ${p.altASL}`,
    `AGL ${p.altAGL}`,
  ];
  const gpsLineY = y + 4;
  const colW4 = CW / 4;
  gpsItems.forEach((txt, i) => {
    pdf.text(txt, MX + i * colW4, gpsLineY);
  });
  // Linea separatrice leggera
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.2);
  pdf.line(MX, y + 6.5, PAGE_W - MX, y + 6.5);
  y += 11;

  // Pulsante Google Earth per ogni foto (se GPS disponibile)
  if (p.lat !== 'N/D' && p.lon !== 'N/D') {
    const earthPhotoUrl = `https://earth.google.com/web/search/${p.lat},${p.lon}/@${p.lat},${p.lon},0a,300d,35y,0h,0t,0r`;
    const eBtnW = 80;
    const eBtnX = (PAGE_W - eBtnW) / 2;
    const eBtnH = 6.5;
    pdfFill(pdf, [120, 125, 135]);
    pdf.rect(eBtnX, y, eBtnW, eBtnH, 'F');
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(7);
    pdfRgb(pdf, COL_WHITE);
    pdf.text('Apri in Google Earth', PAGE_W / 2, y + 4.3, { align: 'center' });
    pdf.link(eBtnX, y, eBtnW, eBtnH, { url: earthPhotoUrl });
    y += 10;
  } else {
    y += 1;
  }

  // ── Rilievo tecnico: box identico alla info card ──
  const sensTxt = [
    sensori.rgb ? 'RGB Standard' : null,
    sensori.term ? 'Termico' : null,
    sensori.multi ? 'Multispettrale' : null,
  ].filter(Boolean).join(' + ') || '—';
  const wasteTxt = (p.entry.wasteState && p.entry.wasteState !== 'Non specificato') ? p.entry.wasteState : '—';
  const accTxt = (p.entry.siteChar && p.entry.siteChar !== 'Non specificata')
    ? p.entry.siteChar.replace("Accessibilita' ", '') : '—';

  const volObj = VOLUME_LEVELS.find(v => v.id === (p.entry.volumeLevel || 'L0')) || VOLUME_LEVELS[0];
  const volTxt = volObj.short;
  const volColor = volObj.id !== 'L0' ? hexToRgb(volObj.color) : COL_GRAY;

  y = sectionLabel(pdf, 'Rilievo tecnico', y);
  const rilievoH = 16;
  const rilievoW = CW / 4;
  pdfFill(pdf, COL_BG);
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.3);
  pdf.rect(MX, y, CW, rilievoH, 'FD');
  [['SENSORE', sensTxt, null], ['STATO RIFIUTI', wasteTxt, null], ['ACCESSIBILITA\'', accTxt, null], ['VOLUME STIMATO', volTxt, volColor]].forEach((t, i) => {
    const tx = MX + i * rilievoW;
    if (i > 0) {
      pdfDraw(pdf, COL_LINE);
      pdf.setLineWidth(0.22);
      pdf.line(tx, y + 2, tx, y + rilievoH - 2);
    }
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(6.2);
    pdfRgb(pdf, COL_RED);
    pdf.text(t[0], tx + 3, y + 5.5);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(7.5);
    pdfRgb(pdf, t[2] || COL_INK);
    // Tronca se necessario invece di splittare (evita spaziatura strana jsPDF)
    let val = String(t[1] || '—');
    while (val.length > 2 && pdf.getTextWidth(val) > rilievoW - 7) {
      val = val.slice(0, -1);
    }
    pdf.text(val, tx + 3, y + 12);
  });
  y += rilievoH + 5;

  // ── Materiali rilevati: solo voci selezionate, come chip ──
  const checkItems = (p.entry.checklist || []).filter(c => c !== 'Altro (specificare)');
  const altroTxt = (p.entry.altro || '').trim();
  if (checkItems.length || altroTxt) {
    y = sectionLabel(pdf, 'Materiali rilevati', y);
    let cx = MX, rowH = 8.5;
    checkItems.forEach(item => {
      const txt = item.length > 32 ? item.substring(0, 30) + '…' : item;
      pdf.setFontSize(8.5);
      const wNeeded = pdf.getTextWidth(txt) + 11;
      if (cx + wNeeded > PAGE_W - MX) { cx = MX; y += rowH; }
      const w = drawChip(pdf, txt, cx, y, false);
      cx += w + 2.5;
    });
    if (altroTxt) {
      const txt = 'Altro: ' + (altroTxt.length > 40 ? altroTxt.substring(0, 38) + '…' : altroTxt);
      pdf.setFontSize(8.5);
      const wNeeded = pdf.getTextWidth(txt) + 11;
      if (cx + wNeeded > PAGE_W - MX) { cx = MX; y += rowH; }
      drawChip(pdf, txt, cx, y, false);
    }
    y += rowH + 3;
  }

  // ── Note operative ──
  const note = (p.entry.noteOperative || '').trim();
  if (note) {
    y = sectionLabel(pdf, 'Note operative', y);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9);
    pdfRgb(pdf, [70, 74, 84]);
    const lines = pdf.splitTextToSize(note, CW - 2);
    lines.slice(0, 4).forEach((l, li) => pdf.text(l, MX, y + li * 4.6));
  }
}

// ════════════════════════════════════════════
//  MAPPA → CANVAS (per PDF) con zoom automatico
// ════════════════════════════════════════════
function latLonToPixel(lat, lon, zoom, tileSize) {
  const scale = tileSize * Math.pow(2, zoom);
  const sinLat = Math.sin(lat * Math.PI / 180);
  const x = ((lon + 180) / 360) * scale;
  const y = (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) * scale;
  return { x, y };
}

// Calcola il zoom massimo tale che tutte le tracce stiano dentro canvasW x canvasH
function calcAutoZoom(lats, lons, canvasW, canvasH, TILE, padding = 40) {
  for (let z = 18; z >= 1; z--) {
    const pts = lats.map((lat, i) => latLonToPixel(lat, lons[i], z, TILE));
    const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
    const spanX = Math.max(...xs) - Math.min(...xs);
    const spanY = Math.max(...ys) - Math.min(...ys);
    if (spanX <= canvasW - padding * 2 && spanY <= canvasH - padding * 2) return z;
  }
  return 1;
}

async function buildMapCanvas(kmlFilesArr) {
  const TILE = 256;
  const allPts = kmlFilesArr.flatMap(k => k.coords.flat());
  if (!allPts.length) return null;

  const lats = allPts.map(p => p[0]);
  const lons = allPts.map(p => p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const cLat = (minLat + maxLat) / 2;
  const cLon = (minLon + maxLon) / 2;

  // Canvas 5×5 tile per avere più margine attorno alle tracce
  const GRID = 5;
  const canvasW = TILE * GRID, canvasH = TILE * GRID;

  // Zoom automatico: sceglie il massimo zoom che fa stare tutte le tracce
  const zoom = calcAutoZoom(lats, lons, canvasW, canvasH, TILE, 50);

  const cp = latLonToPixel(cLat, cLon, zoom, TILE);
  const cTx = Math.floor(cp.x / TILE);
  const cTy = Math.floor(cp.y / TILE);

  const canvas = document.createElement('canvas');
  canvas.width = canvasW; canvas.height = canvasH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(0, 0, canvasW, canvasH);

  const half = Math.floor(GRID / 2); // = 2
  const tilePromises = [];
  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const tx = cTx + dx, ty = cTy + dy;
      const px = (dx + half) * TILE, py = (dy + half) * TILE;
      tilePromises.push(
        fetch(`https://mt1.google.com/vt/lyrs=s&x=${tx}&y=${ty}&z=${zoom}`)
          .then(r => r.ok ? r.blob() : null)
          .then(blob => blob ? createImageBitmap(blob) : null)
          .then(bmp => bmp ? { bmp, px, py } : null)
          .catch(() => null)
      );
    }
  }

  const tiles = await Promise.all(tilePromises);
  tiles.forEach(t => { if (t) ctx.drawImage(t.bmp, t.px, t.py); });

  const originX = (cTx - half) * TILE;
  const originY = (cTy - half) * TILE;

  // Disegna tracce vettoriali sopra i tile
  kmlFilesArr.forEach(kf => {
    const [r, g, b] = hexToRgb(kf.color);
    kf.coords.forEach(group => {
      if (!group.length) return;
      const pixels = group.map(([lat, lon]) => {
        const gp = latLonToPixel(lat, lon, zoom, TILE);
        return [gp.x - originX, gp.y - originY];
      });
      ctx.beginPath();
      ctx.strokeStyle = `rgb(${r},${g},${b})`;
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      pixels.forEach(([px, py], i) => i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py));
      ctx.stroke();
      const first = group[0], last = group[group.length - 1];
      if (group.length > 2 && first[0] === last[0] && first[1] === last[1]) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(${r},${g},${b},0.18)`;
        pixels.forEach(([px, py], i) => i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py));
        ctx.closePath();
        ctx.fill();
      }
    });
  });

  return canvas;
}

async function drawLastPage(pdf) {
  let y = 33;
  y = sectionLabel(pdf, 'Rotta tracciata', y);
  y += 1;

  if (kmlFiles.length > 0) {
    try {
      setProgress(90, 'Rendering mappa tracce…');
      const mapCanvas = await buildMapCanvas(kmlFiles);
      if (mapCanvas) {
        const mapData = mapCanvas.toDataURL('image/jpeg', 0.88);
        const mapH = 168;
        pdf.addImage(mapData, 'JPEG', MX, y, CW, mapH);
        pdfDraw(pdf, COL_LINE);
        pdf.setLineWidth(0.4);
        pdf.rect(MX, y, CW, mapH, 'D');

        // Link Google Maps al centro
        const allPts = kmlFiles.flatMap(k => k.coords.flat());
        if (allPts.length) {
          const cLat = allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
          const cLon = allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
          const mapsUrl = `https://www.google.com/maps?q=${cLat.toFixed(6)},${cLon.toFixed(6)}`;
          const earthUrl = `https://earth.google.com/web/@${cLat.toFixed(6)},${cLon.toFixed(6)},500a,800d,35y,0h,45t,0r`;
          const btnY = y + mapH + 5;
          const btnW = 85;
          const gap = 6;
          const totalW = btnW * 2 + gap;
          const btn1X = (PAGE_W - totalW) / 2;
          const btn2X = btn1X + btnW + gap;
          const soloEarthBtnW = 88;
          const soloEarthBtnX = (PAGE_W - soloEarthBtnW) / 2;
          pdfFill(pdf, [120, 125, 135]);
          pdf.rect(soloEarthBtnX, btnY, soloEarthBtnW, 8, 'F');
          pdf.setFont('helvetica','normal'); pdf.setFontSize(8);
          pdfRgb(pdf, COL_WHITE);
          pdf.text('Apri traccia in Google Earth', PAGE_W/2, btnY + 5.2, { align:'center' });
          pdf.link(soloEarthBtnX, btnY, soloEarthBtnW, 8, { url: earthUrl });
          y = btnY + 14;
        } else {
          y += mapH + 8;
        }

        // Legenda
        y = sectionLabel(pdf, 'Legenda tracce', y);
        kmlFiles.forEach(kf => {
          const rgb = hexToRgb(kf.color);
          pdfFill(pdf, rgb);
          pdf.roundedRect(MX, y - 1, 7, 4.5, 1, 1, 'F');
          pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
          pdfRgb(pdf, COL_INK);
          pdf.text(kf.name, MX + 10, y + 2.4);
          y += 7;
        });
      } else {
        fallbackLastPage(pdf, y);
      }
    } catch(e) {
      console.warn('Map render failed:', e);
      fallbackLastPage(pdf, y);
    }
  } else {
    fallbackLastPage(pdf, y);
  }
}

function fallbackLastPage(pdf, y) {
  pdfFill(pdf, COL_BG);
  pdfDraw(pdf, COL_LINE);
  pdf.setLineWidth(0.4);
  pdf.rect(MX, y, CW, 120, 'FD');
  pdf.setFont('helvetica','bold'); pdf.setFontSize(24);
  pdfRgb(pdf, COL_RED);
  pdf.text('VV.F.', PAGE_W/2, y + 60, { align:'center' });
  pdf.setFont('helvetica','normal'); pdf.setFontSize(10);
  pdfRgb(pdf, COL_GRAY);
  pdf.text('Nessuna traccia KML/GPX caricata', PAGE_W/2, y + 72, { align:'center' });
}

// ════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setProgress(pct, label) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}
